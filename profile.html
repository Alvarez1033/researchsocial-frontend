<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile — ResearchSocial</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root{--text-xs:clamp(.75rem,.7rem+.25vw,.875rem);--text-sm:clamp(.875rem,.8rem+.35vw,1rem);--text-base:clamp(1rem,.95rem+.25vw,1.125rem);--text-lg:clamp(1.125rem,1rem+.75vw,1.5rem);--s1:.25rem;--s2:.5rem;--s3:.75rem;--s4:1rem;--s5:1.25rem;--s6:1.5rem;--s8:2rem;--s10:2.5rem;--s12:3rem;--s16:4rem;--r-sm:.375rem;--r-md:.5rem;--r-lg:.75rem;--r-xl:1rem;--r-2xl:1.5rem;--r-full:9999px;--tr:180ms cubic-bezier(.16,1,.3,1);--font:'Inter',sans-serif;--font-d:'DM Serif Display',Georgia,serif;}
:root,[data-theme="light"]{--bg:#f0f2f5;--surface:#fff;--surface2:#f8f9fa;--off:#eef0f3;--dyn:#e2e5ea;--div:#dde0e5;--bdr:#cdd1d8;--text:#1a1d23;--muted:#636878;--faint:#a8adb8;--inv:#fff;--pri:#4f46e5;--pri-h:#3730a3;--pri-hl:#e0e7ff;--suc:#16a34a;--err:#dc2626;--warn:#d97706;--sh-sm:0 1px 3px rgba(0,0,0,.08);--sh-md:0 4px 16px rgba(0,0,0,.1);--sh-lg:0 12px 40px rgba(0,0,0,.14);--sh-card:0 2px 8px rgba(0,0,0,.06);}
[data-theme="dark"]{--bg:#0d1117;--surface:#161b22;--surface2:#1c2128;--off:#21262d;--dyn:#2d333b;--div:#30363d;--bdr:#3d444d;--text:#e6edf3;--muted:#8b949e;--faint:#484f58;--inv:#0d1117;--pri:#818cf8;--pri-h:#a5b4fc;--pri-hl:#1e1b4b;--suc:#4ade80;--err:#f87171;--warn:#fbbf24;--sh-sm:0 1px 3px rgba(0,0,0,.3);--sh-md:0 4px 16px rgba(0,0,0,.4);--sh-lg:0 12px 40px rgba(0,0,0,.5);--sh-card:0 2px 8px rgba(0,0,0,.25);}
@media(prefers-color-scheme:dark){:root:not([data-theme]){--bg:#0d1117;--surface:#161b22;--off:#21262d;--dyn:#2d333b;--div:#30363d;--bdr:#3d444d;--text:#e6edf3;--muted:#8b949e;--faint:#484f58;--inv:#0d1117;--pri:#818cf8;--pri-h:#a5b4fc;--pri-hl:#1e1b4b;--suc:#4ade80;--err:#f87171;--sh-card:0 2px 8px rgba(0,0,0,.25);}}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth;}
body{min-height:100dvh;font-family:var(--font);font-size:var(--text-base);color:var(--text);background:var(--bg);transition:background .3s,color .3s;}
img,svg{display:block;max-width:100%;}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit;}
a{color:inherit;text-decoration:none;}
input,textarea,select{font:inherit;color:inherit;}
:focus-visible{outline:2px solid var(--pri);outline-offset:3px;border-radius:var(--r-sm);}

/* ── Navbar ── */
.navbar{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:var(--surface);border-bottom:1px solid var(--div);position:sticky;top:0;z-index:100;}
.nav-left{display:flex;align-items:center;gap:16px;}
.nav-back{display:flex;align-items:center;gap:6px;font-size:var(--text-sm);font-weight:500;color:var(--muted);padding:6px 12px;border-radius:var(--r-md);transition:all var(--tr);}
.nav-back:hover{background:var(--off);color:var(--text);}
.nav-logo{display:flex;align-items:center;gap:8px;font-family:var(--font-d);font-size:var(--text-lg);font-weight:700;}
.nav-right{display:flex;align-items:center;gap:10px;}
.btn-icon{width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:var(--r-full);color:var(--muted);transition:all var(--tr);}
.btn-icon:hover{background:var(--off);color:var(--text);}

/* ── Page layout — NO sticky sidebar, clean scroll ── */
.page{max-width:1060px;margin:0 auto;padding:32px 24px 80px;}
.profile-grid{display:grid;grid-template-columns:300px 1fr;gap:32px;align-items:start;}

/* ── Profile Card ── */
.profile-card{background:var(--surface);border:1px solid var(--div);border-radius:var(--r-2xl);overflow:visible;box-shadow:var(--sh-card);}
.profile-banner{height:100px;border-radius:var(--r-2xl) var(--r-2xl) 0 0;position:relative;}
.avatar-wrap{position:absolute;bottom:-36px;left:20px;}
.avatar-ring{width:76px;height:76px;border-radius:50%;border:4px solid var(--surface);background:var(--off);overflow:hidden;display:flex;align-items:center;justify-content:center;font-weight:800;color:white;font-size:22px;box-shadow:var(--sh-sm);}
.avatar-ring img{width:100%;height:100%;object-fit:cover;}
.profile-body{padding:44px 20px 20px;}
.profile-name{font-size:var(--text-lg);font-weight:800;font-family:var(--font-d);line-height:1.2;}
.profile-handle{font-size:13px;color:var(--muted);margin-top:2px;}
.profile-role{display:inline-flex;align-items:center;margin-top:6px;font-size:11px;font-weight:700;padding:2px 10px;border-radius:var(--r-full);}
.profile-title{font-size:13px;color:var(--muted);margin-top:8px;}
.profile-aff{font-size:13px;font-weight:600;color:var(--pri);margin-top:2px;}
.profile-bio{font-size:13px;color:var(--muted);line-height:1.65;margin-top:12px;}
.profile-meta{display:flex;flex-direction:column;gap:6px;margin-top:12px;}
.meta-row{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--faint);}
.meta-row a{color:var(--pri);}
.profile-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:0;margin-top:16px;padding-top:16px;border-top:1px solid var(--div);}
.stat{text-align:center;padding:8px 4px;}
.stat+.stat{border-left:1px solid var(--div);}
.stat-val{font-size:var(--text-base);font-weight:800;font-family:var(--font-d);color:var(--text);line-height:1;}
.stat-lbl{font-size:11px;color:var(--faint);margin-top:3px;}
.profile-actions{display:flex;gap:10px;margin-top:16px;}
.btn-follow-lg{flex:1;padding:9px;border-radius:var(--r-full);font-size:13px;font-weight:700;background:var(--pri);color:var(--inv);transition:all var(--tr);display:flex;align-items:center;justify-content:center;gap:6px;}
.btn-follow-lg:hover{background:var(--pri-h);transform:translateY(-1px);}
.btn-follow-lg.following{background:var(--off);color:var(--text);border:1.5px solid var(--bdr);}
.btn-follow-lg.following:hover{border-color:var(--err);color:var(--err);}
[data-theme="dark"] .btn-follow-lg:not(.following){color:#0d1117;}
.btn-msg{width:38px;height:38px;display:flex;align-items:center;justify-content:center;border-radius:var(--r-full);border:1.5px solid var(--bdr);color:var(--muted);flex-shrink:0;transition:all var(--tr);text-decoration:none;}
.btn-msg:hover{border-color:var(--pri);color:var(--pri);}
.btn-edit{width:100%;padding:9px;border-radius:var(--r-full);font-size:13px;font-weight:600;border:1.5px solid var(--bdr);color:var(--muted);display:flex;align-items:center;justify-content:center;gap:6px;transition:all var(--tr);}
.btn-edit:hover{border-color:var(--pri);color:var(--pri);}
.collab-row{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--off);border-radius:var(--r-lg);margin-top:12px;}
.collab-lbl{font-size:12px;font-weight:600;color:var(--muted);}
.collab-val{font-size:12px;font-weight:700;}.collab-val.open{color:var(--suc);}.collab-val.closed{color:var(--faint);}
/* Toggle switch */
.toggle{position:relative;width:34px;height:18px;flex-shrink:0;}
.toggle input{opacity:0;width:0;height:0;position:absolute;}
.toggle-track{position:absolute;inset:0;background:var(--dyn);border-radius:var(--r-full);cursor:pointer;transition:background var(--tr);}
.toggle input:checked+.toggle-track{background:var(--suc);}
.toggle-thumb{position:absolute;top:2px;left:2px;width:14px;height:14px;background:white;border-radius:50%;transition:transform var(--tr);pointer-events:none;}
.toggle input:checked~.toggle-thumb{transform:translateX(16px);}
.interests{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;}
.chip{font-size:11px;font-weight:500;padding:3px 10px;border-radius:var(--r-full);background:var(--pri-hl);color:var(--pri);}

/* ── Badges — fixed, no overflow glitch ── */
.badges-section{margin-top:20px;padding-top:16px;border-top:1px solid var(--div);}
.badges-title{font-size:12px;font-weight:700;color:var(--faint);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;}
.badges-wrap{display:flex;flex-direction:column;gap:6px;}
.badge-row{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--off);border-radius:var(--r-lg);border:1px solid var(--div);transition:all var(--tr);}
.badge-row:hover{border-color:var(--pri);background:var(--pri-hl);}
.badge-icon{font-size:16px;flex-shrink:0;line-height:1;}
.badge-info{flex:1;min-width:0;}
.badge-name{font-size:12px;font-weight:700;color:var(--text);}
.badge-desc{font-size:11px;color:var(--faint);margin-top:1px;}

/* ── Right: Tabs + Posts ── */
.sec-tabs{display:flex;gap:4px;background:var(--off);border-radius:var(--r-full);padding:4px;margin-bottom:20px;}
.sec-tab{padding:7px 16px;border-radius:var(--r-full);font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;transition:all var(--tr);}
.sec-tab.active{background:var(--surface);color:var(--text);box-shadow:var(--sh-sm);}
.tab-panel{display:none;}.tab-panel.active{display:block;}
.post-card{background:var(--surface);border:1px solid var(--div);border-radius:var(--r-xl);padding:20px;margin-bottom:14px;transition:all var(--tr);box-shadow:var(--sh-card);}
.post-card:hover{border-color:var(--bdr);box-shadow:var(--sh-md);transform:translateY(-1px);}
.type-badge{font-size:11px;font-weight:700;padding:2px 10px;border-radius:var(--r-full);letter-spacing:.04em;text-transform:uppercase;}
.b-proposal{background:#dbeafe;color:#1d4ed8;}[data-theme="dark"] .b-proposal{background:#1e3a5f;color:#60a5fa;}
.b-study{background:#d1fae5;color:#065f46;}[data-theme="dark"] .b-study{background:#14532d;color:#34d399;}
.b-review{background:#fef3c7;color:#92400e;}[data-theme="dark"] .b-review{background:#451a03;color:#fbbf24;}
.b-findings{background:#ede9fe;color:#5b21b6;}[data-theme="dark"] .b-findings{background:#2e1065;color:#a78bfa;}
.b-discussion{background:#f1f5f9;color:#374151;}[data-theme="dark"] .b-discussion{background:#1f2937;color:#9ca3af;}
.post-title{font-size:var(--text-base);font-weight:700;font-family:var(--font-d);margin:8px 0 6px;}
.post-excerpt{font-size:13px;color:var(--muted);line-height:1.65;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.post-tags{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0;}
.tag{font-size:11px;font-weight:500;padding:2px 10px;border-radius:var(--r-full);}
.post-footer{display:flex;align-items:center;justify-content:space-between;padding-top:12px;border-top:1px solid var(--div);margin-top:10px;}
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
.about-stat{background:var(--off);border-radius:var(--r-lg);padding:16px;text-align:center;}
.about-val{font-size:var(--text-lg);font-weight:800;font-family:var(--font-d);color:var(--pri);line-height:1;}
.about-lbl{font-size:11px;color:var(--faint);margin-top:4px;}
.empty-state{text-align:center;padding:60px 20px;color:var(--faint);}
.empty-icon{font-size:40px;margin-bottom:12px;}

/* ── Edit Profile Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--surface);border:1px solid var(--bdr);border-radius:var(--r-2xl);width:100%;max-width:540px;max-height:90dvh;overflow-y:auto;box-shadow:var(--sh-lg);transform:scale(.95) translateY(10px);transition:transform .2s cubic-bezier(.16,1,.3,1);}
.modal-overlay.open .modal{transform:scale(1) translateY(0);}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--div);position:sticky;top:0;background:var(--surface);z-index:1;}
.modal-title{font-size:16px;font-weight:800;}
.modal-close{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:var(--r-full);color:var(--muted);transition:all var(--tr);}
.modal-close:hover{background:var(--off);color:var(--text);}
.modal-body{padding:20px;}
.modal-footer{padding:16px 20px;border-top:1px solid var(--div);display:flex;gap:10px;}
.form-group{margin-bottom:16px;}
.form-label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em;}
.form-input,.form-textarea,.form-select{width:100%;padding:9px 12px;background:var(--off);border:1px solid var(--bdr);border-radius:var(--r-lg);font-size:13px;color:var(--text);transition:all var(--tr);}
.form-input:focus,.form-textarea:focus,.form-select:focus{outline:none;border-color:var(--pri);box-shadow:0 0 0 3px var(--pri-hl);}
.form-textarea{resize:vertical;min-height:88px;line-height:1.6;}
.form-2col{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.avatar-upload-row{display:flex;align-items:center;gap:16px;}
.avatar-preview{width:60px;height:60px;border-radius:50%;background:var(--off);border:2px solid var(--bdr);display:flex;align-items:center;justify-content:center;overflow:hidden;font-size:18px;font-weight:800;color:white;flex-shrink:0;}
.avatar-preview img{width:100%;height:100%;object-fit:cover;}
.btn-upload{padding:7px 14px;border:1.5px dashed var(--bdr);border-radius:var(--r-lg);font-size:12px;color:var(--muted);cursor:pointer;transition:all var(--tr);}
.btn-upload:hover{border-color:var(--pri);color:var(--pri);}
.btn-save{flex:1;padding:10px;background:var(--pri);color:var(--inv);border-radius:var(--r-full);font-size:13px;font-weight:700;transition:all var(--tr);}
.btn-save:hover{background:var(--pri-h);}
[data-theme="dark"] .btn-save{color:#0d1117;}
.btn-cancel{padding:10px 18px;border:1.5px solid var(--bdr);border-radius:var(--r-full);font-size:13px;font-weight:600;color:var(--muted);transition:all var(--tr);}
.btn-cancel:hover{border-color:var(--err);color:var(--err);}
.interests-input-hint{font-size:11px;color:var(--faint);margin-top:4px;}

/* ── Responsive ── */
@media(max-width:860px){.profile-grid{grid-template-columns:1fr;}.page{padding:20px 16px 60px;}}
@media(max-width:600px){.form-2col{grid-template-columns:1fr;}.navbar{padding:10px 16px;}}
</style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="nav-left">
    <a href="/" class="nav-back">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
      Feed
    </a>
    <a href="/" class="nav-logo">
      <svg width="24" height="24" viewBox="0 0 32 32" fill="none">
        <rect width="32" height="32" rx="8" fill="var(--pri)"/>
        <circle cx="11" cy="11" r="4.5" stroke="white" stroke-width="2" fill="none"/>
        <circle cx="21" cy="11" r="4.5" stroke="white" stroke-width="2" fill="none" opacity=".6"/>
        <circle cx="16" cy="21" r="4.5" stroke="white" stroke-width="2" fill="none" opacity=".8"/>
      </svg>
      <span>ResearchSocial</span>
    </a>
  </div>
  <div class="nav-right">
    <button class="btn-icon" data-theme-toggle title="Toggle theme">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
    <div id="navInfo"></div>
  </div>
</nav>

<!-- PAGE -->
<div class="page">
  <div id="profileGrid" class="profile-grid">
    <div style="color:var(--muted);padding:40px;text-align:center;">Loading…</div>
  </div>
</div>

<!-- EDIT PROFILE MODAL -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-hdr">
      <span class="modal-title">Edit Profile</span>
      <button class="modal-close" onclick="closeEdit()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <!-- Avatar -->
      <div class="form-group">
        <label class="form-label">Photo</label>
        <div class="avatar-upload-row">
          <div class="avatar-preview" id="editAvatarPreview"></div>
          <div>
            <label class="btn-upload" for="avatarFile">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline;vertical-align:middle;margin-right:4px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              Upload photo
            </label>
            <input type="file" id="avatarFile" accept="image/*" style="display:none;" onchange="handleAvatarFile(event)">
            <div style="font-size:11px;color:var(--faint);margin-top:6px;">JPG, PNG or GIF · max 2MB</div>
          </div>
        </div>
      </div>
      <!-- Name + Handle (handle read-only) -->
      <div class="form-2col">
        <div class="form-group">
          <label class="form-label">Display Name</label>
          <input class="form-input" id="editName" type="text" placeholder="Dr. Jane Smith">
        </div>
        <div class="form-group">
          <label class="form-label">Username</label>
          <input class="form-input" id="editHandle" type="text" disabled style="opacity:.5;cursor:not-allowed;">
          <div style="font-size:11px;color:var(--faint);margin-top:4px;">Cannot be changed</div>
        </div>
      </div>
      <!-- Title + Affiliation -->
      <div class="form-2col">
        <div class="form-group">
          <label class="form-label">Title / Role</label>
          <input class="form-input" id="editTitle" type="text" placeholder="Associate Professor">
        </div>
        <div class="form-group">
          <label class="form-label">Affiliation</label>
          <input class="form-input" id="editAffiliation" type="text" placeholder="MIT, Harvard…">
        </div>
      </div>
      <!-- Bio -->
      <div class="form-group">
        <label class="form-label">Bio</label>
        <textarea class="form-textarea" id="editBio" placeholder="Tell the community about your research…" style="min-height:100px;"></textarea>
      </div>
      <!-- Location + Website -->
      <div class="form-2col">
        <div class="form-group">
          <label class="form-label">Location</label>
          <input class="form-input" id="editLocation" type="text" placeholder="Cambridge, MA">
        </div>
        <div class="form-group">
          <label class="form-label">Website</label>
          <input class="form-input" id="editWebsite" type="url" placeholder="https://yoursite.com">
        </div>
      </div>
      <!-- Research interests -->
      <div class="form-group">
        <label class="form-label">Research Interests</label>
        <input class="form-input" id="editInterests" type="text" placeholder="Sleep, EEG, Cognitive Science">
        <div class="interests-input-hint">Separate with commas</div>
      </div>
      <!-- Open to collaborate -->
      <div class="form-group">
        <label class="form-label">Open to Collaborate</label>
        <div style="display:flex;align-items:center;gap:10px;">
          <label class="toggle">
            <input type="checkbox" id="editCollab">
            <div class="toggle-track"></div>
            <div class="toggle-thumb"></div>
          </label>
          <span style="font-size:13px;color:var(--muted)">Allow collaboration requests</span>
        </div>
      </div>
      <div id="editError" style="color:var(--err);font-size:12px;display:none;margin-top:8px;"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeEdit()">Cancel</button>
      <button class="btn-save" id="saveBtn" onclick="saveProfile()">Save Changes</button>
    </div>
  </div>
</div>

<footer style="text-align:center;padding:24px;font-size:12px;color:var(--faint);border-top:1px solid var(--div);margin-top:32px;">
  <a href="https://www.perplexity.ai/computer" target="_blank" rel="noopener noreferrer" style="color:var(--pri)">Created with Perplexity Computer</a>
</footer>

<script src="/socket.io/socket.io.js"></script>
<script src="/api.js"></script>
<script>
// ── Theme ────────────────────────────────────────────────────────────────────
(function(){
  const t=document.querySelector('[data-theme-toggle]'),r=document.documentElement;
  let d=localStorage.getItem('rs_theme')||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');
  r.setAttribute('data-theme',d);upd(d);
  t.addEventListener('click',()=>{d=d==='dark'?'light':'dark';r.setAttribute('data-theme',d);localStorage.setItem('rs_theme',d);upd(d);});

// ── Badges helper ─────────────────────────────────────────────────────────────
function getBadges(user) {
  const badges = [];
  badges.push({ icon: '🌱', name: 'Early Researcher', desc: 'One of the first members' });
  if (user.is_verified)            badges.push({ icon: '✓',  name: 'Verified Researcher', desc: 'Identity verified by admins' });
  if (user.followers_count >= 500) badges.push({ icon: '🌟', name: 'Rising Star', desc: '500+ followers' });
  if (user.followers_count >= 2000)badges.push({ icon: '🏆', name: 'Top Researcher', desc: '2000+ followers' });
  if (user.papers_count >= 10)     badges.push({ icon: '📚', name: 'Prolific Author', desc: '10+ papers' });
  if (user.open_to_collab)         badges.push({ icon: '🤝', name: 'Collaboration Star', desc: 'Open to collaborations' });
  if (user.citations_count >= 1000)badges.push({ icon: '📖', name: 'Highly Cited', desc: '1000+ citations' });
  if ((user.posts||[]).length >= 5) badges.push({ icon: '✍️', name: 'Active Poster', desc: '5+ posts published' });
  return badges;
}

// ── Edit Profile Modal ────────────────────────────────────────────────────────
function openEdit() {
  if (!currentUser) return;
  // Populate form
  document.getElementById('editName').value = currentUser.name || '';
  document.getElementById('editHandle').value = currentUser.handle || '';
  document.getElementById('editTitle').value = currentUser.title || '';
  document.getElementById('editAffiliation').value = currentUser.affiliation || '';
  document.getElementById('editBio').value = currentUser.bio || '';
  document.getElementById('editLocation').value = currentUser.location || '';
  document.getElementById('editWebsite').value = currentUser.website || '';
  document.getElementById('editInterests').value = (currentUser.interests || []).join(', ');
  document.getElementById('editCollab').checked = currentUser.open_to_collab !== false;

  // Avatar preview
  const prev = document.getElementById('editAvatarPreview');
  prev.style.background = currentUser.color || '#818cf8';
  prev.innerHTML = currentUser.avatar_url
    ? `<img src="${esc(currentUser.avatar_url)}" alt="">`
    : (currentUser.initials || '?');

  pendingAvatar = null;
  document.getElementById('editError').style.display = 'none';
  document.getElementById('editModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeEdit() {
  document.getElementById('editModal').classList.remove('open');
  document.body.style.overflow = '';
}

function handleAvatarFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  if (file.size > 2 * 1024 * 1024) { showToast('⚠️ Image must be under 2MB'); return; }
  const reader = new FileReader();
  reader.onload = ev => {
    pendingAvatar = ev.target.result;
    const prev = document.getElementById('editAvatarPreview');
    prev.innerHTML = `<img src="${pendingAvatar}" alt="">`;
  };
  reader.readAsDataURL(file);
}

async function saveProfile() {
  const errEl = document.getElementById('editError');
  const saveBtn = document.getElementById('saveBtn');
  errEl.style.display = 'none';
  saveBtn.textContent = 'Saving…';
  saveBtn.disabled = true;

  try {
    const patch = {
      name: document.getElementById('editName').value.trim(),
      title: document.getElementById('editTitle').value.trim(),
      affiliation: document.getElementById('editAffiliation').value.trim(),
      bio: document.getElementById('editBio').value.trim(),
      location: document.getElementById('editLocation').value.trim(),
      website: document.getElementById('editWebsite').value.trim(),
      interests: document.getElementById('editInterests').value
        .split(',').map(s => s.trim()).filter(Boolean),
      open_to_collab: document.getElementById('editCollab').checked,
    };

    if (!patch.name || patch.name.length < 2) {
      throw new Error('Name must be at least 2 characters.');
    }

    // Upload avatar separately if changed
    if (pendingAvatar) {
      // Convert base64 to blob and upload via FormData
      const res = await fetch(pendingAvatar);
      const blob = await res.blob();
      const form = new FormData();
      form.append('avatar', blob, 'avatar.jpg');
      const token = Auth.getToken();
      const uploadRes = await fetch('/api/users/me/avatar', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}` },
        body: form
      });
      if (uploadRes.ok) {
        const data = await uploadRes.json();
        patch.avatar_url = data.avatarUrl;
      }
    }

    const updated = await API.updateProfile(patch);

    // Update local auth user cache
    const stored = Auth.getUser();
    if (stored) Auth.setUser({ ...stored, ...updated });

    closeEdit();
    currentUser = { ...currentUser, ...updated };
    renderProfile(currentUser);
    showToast('✅ Profile saved!');
  } catch(e) {
    errEl.textContent = e.message;
    errEl.style.display = 'block';
  } finally {
    saveBtn.textContent = 'Save Changes';
    saveBtn.disabled = false;
  }
}

// Close modal on overlay click / Escape
document.getElementById('editModal').addEventListener('click', e => {
  if (e.target === document.getElementById('editModal')) closeEdit();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeEdit();
});

let friendshipId = null;

  try {
    const res = await API.getFriendStatus(HANDLE);
    friendStatus = res.status;

function updateFriendBtn() {
  const btn = document.getElementById('friendBtn');
  if (!btn) return;
  const map = {
    none:             { html: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>', title: 'Add Friend',      color: 'var(--muted)', border: 'var(--bdr)' },
    request_sent:     { html: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>',             title: 'Cancel Request', color: 'var(--warn)', border: 'var(--warn)' },
    request_received: { html: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>',                                                                    title: 'Accept Request', color: 'var(--suc)',  border: 'var(--suc)' },
    friends:          { html: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>',                                                                    title: 'Friends ✓',      color: 'var(--pri)',  border: 'var(--pri)' },
  };
  const s = map[friendStatus] || map.none;
  btn.title = s.title;
  btn.style.color = s.color;
  btn.style.borderColor = s.border;
  btn.innerHTML = s.html;
}

async function handleFriendAction() {
  if (!me) { showToast('Sign in to add friends'); return; }
  try {
    if (friendStatus === 'none') {
      await API.sendFriendRequest(HANDLE);
      friendStatus = 'request_sent';
      showToast('Friend request sent to @' + HANDLE + '!');
    } else if (friendStatus === 'request_sent') {
      await API.cancelFriendRequest(HANDLE);
      friendStatus = 'none';
      showToast('Friend request cancelled');
    } else if (friendStatus === 'request_received') {
      if (friendshipId) {
        await API.acceptFriendRequest(friendshipId);
        friendStatus = 'friends';
        showToast('You are now friends with @' + HANDLE + '!');
      }
    } else if (friendStatus === 'friends') {
      if (confirm('Remove @' + HANDLE + ' as a friend?')) {
        await API.removeFriend(HANDLE);
        friendStatus = 'none';
        showToast('Removed @' + HANDLE + ' as a friend');
      }
    }
    updateFriendBtn();
  } catch(e) { showToast('Failed: ' + e.message); }
}

    <div style="position:relative;margin-bottom:12px;">
      <svg style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--faint);pointer-events:none;" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="friendSearchInput" placeholder="Search friends…"
        style="width:100%;padding:8px 12px 8px 32px;background:var(--off);border:1.5px solid var(--bdr);border-radius:var(--r-full);font-size:13px;color:var(--text);transition:all var(--tr);"
        onfocus="this.style.borderColor='var(--pri)';this.style.boxShadow='0 0 0 3px var(--pri-hl)'"
        onblur="this.style.borderColor='var(--bdr)';this.style.boxShadow=''"
        oninput="filterFriendsList(this.value)">
    </div>
    <div id="friendsListEl"><div style="text-align:center;padding:20px;color:var(--muted)">Loading...</div></div>`;

  try {
    const friends = await API.getUserFriends(handle);
    window._friendsCache = friends;
    renderFriendsList(friends);
  } catch(e) {
    document.getElementById('friendsListEl').innerHTML = '<div style="color:var(--muted);text-align:center;padding:20px">Failed to load</div>';
  }
}

function filterFriendsList(q) {
  const friends = window._friendsCache || [];
  if (!q.trim()) { renderFriendsList(friends); return; }
  const lower = q.toLowerCase();
  renderFriendsList(friends.filter(u =>
    u.handle.toLowerCase().includes(lower) ||
    u.name.toLowerCase().includes(lower) ||
    (u.affiliation||'').toLowerCase().includes(lower)
  ));
}

function renderFriendsList(friends) {
  const el = document.getElementById('friendsListEl');
  if (!el) return;
  if (!friends.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">👥</div><div style="font-weight:600;margin-bottom:6px">No friends found</div></div>';
    return;
  }
  el.innerHTML = friends.map(u => `
      <div style="display:flex;align-items:center;gap:12px;padding:12px;background:var(--surface);border:1px solid var(--div);border-radius:var(--r-xl);margin-bottom:10px;transition:all var(--tr);"
           onmouseover="this.style.borderColor='var(--bdr)';this.style.boxShadow='var(--sh-card)'"
           onmouseout="this.style.borderColor='var(--div)';this.style.boxShadow=''">
        <a href="/profile/${esc(u.handle)}">${avatarSVG(u, 44)}</a>
        <div style="flex:1;min-width:0;">
          <div style="font-weight:700;font-size:14px;">
            <a href="/profile/${esc(u.handle)}" style="transition:color var(--tr);"
               onmouseover="this.style.color='var(--pri)'" onmouseout="this.style.color=''"
            >${esc(u.name)}</a>
            ${u.is_verified ? '<span style="color:var(--pri);font-size:11px" title="Verified">✓</span>' : ''}
          </div>
          <div style="font-size:12px;color:var(--muted);">@${esc(u.handle)}</div>
          ${u.affiliation ? `<div style="font-size:11px;color:var(--faint);">${esc(u.affiliation)}</div>` : ''}
        </div>
        <a href="/profile/${esc(u.handle)}" style="font-size:12px;color:var(--pri);padding:6px 12px;border:1px solid var(--pri);border-radius:var(--r-full);transition:all var(--tr);"
           onmouseover="this.style.background='var(--pri-hl)'" onmouseout="this.style.background=''">View</a>
      </div>`).join('');
}

// Also handle incoming friend requests — show a banner if any pending
async function loadPendingRequests() {
  if (!me || me.handle !== HANDLE) return;
  try {
    const requests = await API.getFriendRequests();
    if (!requests.length) return;
    const banner = document.createElement('div');
    banner.style.cssText = 'background:var(--pri-hl);border:1px solid var(--pri);border-radius:var(--r-lg);padding:12px 16px;margin-bottom:16px;font-size:13px;';
    banner.innerHTML = `
      <div style="font-weight:700;color:var(--pri);margin-bottom:8px;">
        ${requests.length} pending friend request${requests.length>1?'s':''}
      </div>
      ${requests.slice(0,3).map(r => `
        <div style="display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--pri-hl);">
          <a href="/profile/${esc(r.handle)}">${avatarSVG(r, 32)}</a>
          <div style="flex:1"><div style="font-weight:600;">@${esc(r.handle)}</div><div style="font-size:11px;color:var(--muted)">${esc(r.affiliation||'')}</div></div>
          <button onclick="acceptRequest('${esc(r.friendship_id)}','${esc(r.handle)}',this)" style="padding:5px 12px;background:var(--suc);color:#0d2b0d;border-radius:var(--r-full);font-size:11px;font-weight:700;transition:all var(--tr);">Accept</button>
          <button onclick="declineRequest('${esc(r.friendship_id)}',this)" style="padding:5px 12px;border:1px solid var(--bdr);border-radius:var(--r-full);font-size:11px;font-weight:600;color:var(--muted);transition:all var(--tr);">Decline</button>
        </div>`).join('')}
    `;
    const grid = document.getElementById('profileGrid');
    grid.insertAdjacentElement('beforebegin', banner);
  } catch(_) {}
}

async function acceptRequest(id, handle, btn) {
  try {
    await API.acceptFriendRequest(id);
    btn.closest('div[style*="border-bottom"]').style.opacity = '0.5';
    showToast('You are now friends with @' + handle + '!');
    setTimeout(() => btn.closest('div[style*="border-bottom"]')?.remove(), 500);
  } catch(e) { showToast('Failed: ' + e.message); }
}

async function declineRequest(id, btn) {
  try {
    await API.declineFriendRequest(id);
    btn.closest('div[style*="border-bottom"]').style.opacity = '0.5';
    setTimeout(() => btn.closest('div[style*="border-bottom"]')?.remove(), 500);
  } catch(e) { showToast('Failed: ' + e.message); }
}

// ── Boot ──────────────────────────────────────────────────────────────────────
loadProfile().then(() => { loadFriendStatus(); loadPendingRequests(); });
</script>
</body>
</html>
