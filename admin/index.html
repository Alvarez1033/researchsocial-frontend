<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel — ResearchSocial</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--font:'Inter',sans-serif;}
[data-theme="dark"]{--bg:#0d1117;--surface:#161b22;--surface2:#1c2128;--div:#30363d;--bdr:#3d444d;--text:#e6edf3;--muted:#8b949e;--faint:#484f58;--pri:#818cf8;--pri-hl:#1e1b4b;--suc:#4ade80;--err:#f87171;--warn:#fbbf24;}
[data-theme="light"]{--bg:#f0f2f5;--surface:#fff;--surface2:#f8f9fa;--div:#dde0e5;--bdr:#cdd1d8;--text:#1a1d23;--muted:#636878;--faint:#a8adb8;--pri:#4f46e5;--pri-hl:#e0e7ff;--suc:#16a34a;--err:#dc2626;--warn:#d97706;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;}
a{color:var(--pri);text-decoration:none;}
button{cursor:pointer;font:inherit;color:inherit;background:none;border:none;}
input,select{font:inherit;color:var(--text);background:var(--surface2);border:1px solid var(--div);border-radius:8px;padding:8px 12px;}
input:focus,select:focus{outline:none;border-color:var(--pri);}

/* Layout */
.app{display:none;grid-template-columns:220px 1fr;min-height:100vh;}
.sidebar{background:var(--surface);border-right:1px solid var(--div);padding:20px 0;display:flex;flex-direction:column;}
.sidebar-logo{padding:0 20px 20px;font-size:14px;font-weight:700;color:var(--pri);border-bottom:1px solid var(--div);margin-bottom:12px;}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 20px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .15s;}
.sidebar-item:hover{background:var(--surface2);color:var(--text);}
.sidebar-item.active{color:var(--pri);background:var(--pri-hl);}
.sidebar-bottom{margin-top:auto;padding:16px 20px;border-top:1px solid var(--div);}
.main{padding:28px 32px;overflow-y:auto;}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;}
.topbar h1{font-size:20px;font-weight:700;}
.topbar-right{display:flex;align-items:center;gap:12px;}
.btn{padding:7px 16px;border-radius:8px;font-size:13px;font-weight:600;transition:all .15s;}
.btn-outline{border:1px solid var(--div);color:var(--muted);}
.btn-outline:hover{border-color:var(--bdr);color:var(--text);}
.btn-primary{background:var(--pri);color:#fff;}
.btn-primary:hover{opacity:.9;}
.btn-danger{color:var(--err);}

/* Login */
.login{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.login-box{max-width:380px;width:100%;background:var(--surface);border:1px solid var(--div);border-radius:16px;padding:32px;}
.login-box h2{font-size:18px;margin-bottom:4px;}
.login-box p{font-size:13px;color:var(--muted);margin-bottom:20px;}
.login-box label{font-size:12px;font-weight:600;color:var(--muted);display:block;margin-bottom:4px;}
.login-box input{width:100%;margin-bottom:14px;}
.login-err{color:var(--err);font-size:12px;margin-bottom:10px;display:none;}
.login-btn{width:100%;padding:10px;background:var(--pri);color:#fff;border:none;border-radius:8px;font-weight:600;font-size:14px;}

/* Cards */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:28px;}
.stat{background:var(--surface);border:1px solid var(--div);border-radius:12px;padding:18px;}
.stat-val{font-size:24px;font-weight:700;}
.stat-label{font-size:12px;color:var(--muted);margin-top:2px;}
.stat-sub{font-size:11px;color:var(--faint);margin-top:4px;}

/* Table */
.tbl{width:100%;border-collapse:collapse;font-size:13px;}
.tbl th{text-align:left;padding:10px 12px;font-size:11px;font-weight:700;color:var(--faint);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--div);}
.tbl td{padding:10px 12px;border-bottom:1px solid var(--div);}
.tbl tr:hover td{background:var(--surface2);}
.role-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;text-transform:uppercase;}
.role-superadmin{background:#7c2d1233;color:#f87171;}
.role-admin{background:#1e3a5f;color:#60a5fa;}
.role-moderator{background:#451a03;color:#fbbf24;}
.role-member,.role-user{background:#21262d;color:#8b949e;}
.status-active{color:var(--suc);}
.status-banned,.status-suspended{color:var(--err);}

/* Sections */
.section{display:none;}
.section.active{display:block;}
.section-title{font-size:16px;font-weight:700;margin-bottom:16px;}
.empty-msg{text-align:center;padding:40px;color:var(--faint);font-size:13px;}

/* Avatar */
.av{display:inline-flex;align-items:center;justify-content:center;border-radius:50%;color:#fff;font-weight:600;font-size:11px;flex-shrink:0;}
</style>
</head>
<body>

<!-- LOGIN PAGE -->
<div class="login" id="loginPage">
  <div class="login-box">
    <h2>Admin Panel</h2>
    <p>Sign in with an admin account to continue.</p>
    <label>Email</label>
    <input type="email" id="loginEmail" placeholder="admin@researchsocial.com">
    <label>Password</label>
    <input type="password" id="loginPw" placeholder="••••••••">
    <div class="login-err" id="loginErr"></div>
    <button class="login-btn" id="loginBtn">Sign In</button>
  </div>
</div>

<!-- ADMIN APP -->
<div class="app" id="adminApp">
  <aside class="sidebar">
    <div class="sidebar-logo">🔬 RS Admin</div>
    <div class="sidebar-item active" data-sec="dashboard">📊 Dashboard</div>
    <div class="sidebar-item" data-sec="users">👥 Users</div>
    <div class="sidebar-item" data-sec="posts">📝 Posts</div>
    <div class="sidebar-bottom">
      <div style="font-size:12px;color:var(--muted)" id="adminName"></div>
      <button class="btn btn-outline" style="margin-top:8px;width:100%;text-align:center" id="logoutBtn">Sign Out</button>
    </div>
  </aside>
  <div class="main">
    <!-- Dashboard -->
    <div class="section active" id="sec-dashboard">
      <div class="topbar"><h1>Dashboard</h1><div class="topbar-right"><a href="/" class="btn btn-outline">← Back to site</a></div></div>
      <div class="stats" id="statsGrid"></div>
      <div class="section-title">Recent Users</div>
      <table class="tbl" id="recentUsersTable"><thead><tr><th>User</th><th>Role</th><th>Status</th><th>Joined</th></tr></thead><tbody></tbody></table>
    </div>
    <!-- Users -->
    <div class="section" id="sec-users">
      <div class="topbar"><h1>Users</h1><div class="topbar-right"><input type="text" id="userSearch" placeholder="Search users..." style="width:220px"></div></div>
      <table class="tbl" id="usersTable"><thead><tr><th>User</th><th>Email</th><th>Role</th><th>Status</th><th>Posts</th><th>Joined</th><th>Actions</th></tr></thead><tbody></tbody></table>
    </div>
    <!-- Posts -->
    <div class="section" id="sec-posts">
      <div class="topbar"><h1>Posts</h1></div>
      <table class="tbl" id="postsTable"><thead><tr><th>Title</th><th>Author</th><th>Type</th><th>Status</th><th>Likes</th><th>Date</th><th>Actions</th></tr></thead><tbody></tbody></table>
    </div>
  </div>
</div>

<script>
var API = '/api';
var TOKEN = localStorage.getItem('rs_admin_token') || localStorage.getItem('rs_access_token');
var REFRESH = localStorage.getItem('rs_refresh_token');
var ME = null;

/* ── API helper ── */
async function api(method, path, body) {
  var opts = { method: method, headers: { 'Content-Type': 'application/json' } };
  if (TOKEN) opts.headers['Authorization'] = 'Bearer ' + TOKEN;
  if (body) opts.body = JSON.stringify(body);
  var r = await fetch(API + path, opts);
  if (r.status === 401 && REFRESH) {
    var rr = await fetch(API + '/auth/refresh', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({refreshToken:REFRESH}) });
    if (rr.ok) {
      var rd = await rr.json();
      TOKEN = rd.accessToken;
      REFRESH = rd.refreshToken || REFRESH;
      localStorage.setItem('rs_admin_token', TOKEN);
      localStorage.setItem('rs_access_token', TOKEN);
      localStorage.setItem('rs_refresh_token', REFRESH);
      opts.headers['Authorization'] = 'Bearer ' + TOKEN;
      r = await fetch(API + path, opts);
    }
  }
  var data = await r.json();
  if (!r.ok) throw new Error(data.error || 'Request failed');
  return data;
}

/* ── Helpers ── */
function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
function ago(t){if(!t)return '-';var ms=Date.now()-new Date(t).getTime(),m=Math.floor(ms/60000);if(m<60)return m+'m ago';var h=Math.floor(m/60);if(h<24)return h+'h ago';return Math.floor(h/24)+'d ago';}
function av(color,initials,sz){return '<div class="av" style="width:'+sz+'px;height:'+sz+'px;background:'+(color||'#818cf8')+'">'+esc(initials||'?')+'</div>';}
function roleBadge(r){return '<span class="role-badge role-'+(r||'member')+'">'+esc(r||'member')+'</span>';}

/* ── Auth ── */
async function checkAuth() {
  if (!TOKEN) return showLogin();
  try {
    ME = await api('GET', '/auth/me');
    if (!['admin','superadmin','moderator'].includes(ME.role)) return showLogin();
    showApp();
  } catch(e) {
    showLogin();
  }
}

function showLogin() {
  TOKEN = null;
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('adminApp').style.display = 'none';
}

function showApp() {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('adminApp').style.display = 'grid';
  document.getElementById('adminName').textContent = '@' + (ME.handle || ME.username || 'admin') + ' (' + ME.role + ')';
  loadDashboard();
}

document.getElementById('loginBtn').addEventListener('click', async function() {
  var email = document.getElementById('loginEmail').value;
  var pw = document.getElementById('loginPw').value;
  var err = document.getElementById('loginErr');
  err.style.display = 'none';
  try {
    var data = await api('POST', '/auth/login', { email: email, password: pw });
    if (!['admin','superadmin','moderator'].includes(data.user.role)) {
      err.textContent = 'Access denied — admin role required';
      err.style.display = 'block';
      return;
    }
    TOKEN = data.accessToken;
    REFRESH = data.refreshToken;
    ME = data.user;
    localStorage.setItem('rs_admin_token', TOKEN);
    localStorage.setItem('rs_access_token', TOKEN);
    localStorage.setItem('rs_refresh_token', REFRESH);
    showApp();
  } catch(e) {
    err.textContent = e.message;
    err.style.display = 'block';
  }
});

document.getElementById('loginPw').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('loginBtn').click();
});

document.getElementById('logoutBtn').addEventListener('click', function() {
  TOKEN = null; REFRESH = null; ME = null;
  localStorage.removeItem('rs_admin_token');
  localStorage.removeItem('rs_access_token');
  localStorage.removeItem('rs_refresh_token');
  localStorage.removeItem('rs_user');
  location.reload();
});

/* ── Navigation ── */
document.querySelectorAll('.sidebar-item').forEach(function(item) {
  item.addEventListener('click', function() {
    document.querySelectorAll('.sidebar-item').forEach(function(i){i.classList.remove('active');});
    item.classList.add('active');
    document.querySelectorAll('.section').forEach(function(s){s.classList.remove('active');});
    var sec = document.getElementById('sec-' + item.dataset.sec);
    if (sec) sec.classList.add('active');
    if (item.dataset.sec === 'users') loadUsers();
    if (item.dataset.sec === 'posts') loadPosts();
  });
});

/* ── Dashboard ── */
async function loadDashboard() {
  try {
    var data = await api('GET', '/admin/stats');
    var u = data.users || {}, p = data.posts || {}, m = data.messages || {};
    document.getElementById('statsGrid').innerHTML =
      '<div class="stat"><div class="stat-val">' + (u.total||0) + '</div><div class="stat-label">Total Users</div><div class="stat-sub">+' + (u.today||0) + ' today</div></div>' +
      '<div class="stat"><div class="stat-val">' + (p.total||0) + '</div><div class="stat-label">Total Posts</div><div class="stat-sub">' + (p.pending||0) + ' pending</div></div>' +
      '<div class="stat"><div class="stat-val">' + (p.approved||0) + '</div><div class="stat-label">Published</div><div class="stat-sub">+' + (p.today||0) + ' today</div></div>' +
      '<div class="stat"><div class="stat-val">' + (m.total||0) + '</div><div class="stat-label">Messages</div><div class="stat-sub">+' + (m.today||0) + ' today</div></div>';

    var users = data.top_users || [];
    var tbody = document.querySelector('#recentUsersTable tbody');
    if (users.length) {
      tbody.innerHTML = users.slice(0,8).map(function(u) {
        return '<tr><td style="display:flex;align-items:center;gap:8px">' + av(u.color,u.initials,28) + '<div><div style="font-weight:600;font-size:13px">' + esc(u.name) + '</div><div style="font-size:11px;color:var(--muted)">@' + esc(u.handle) + '</div></div></td><td>' + roleBadge(u.role||'member') + '</td><td>-</td><td>' + ago(u.created_at) + '</td></tr>';
      }).join('');
    } else {
      tbody.innerHTML = '<tr><td colspan="4" class="empty-msg">No users yet</td></tr>';
    }
  } catch(e) {
    document.getElementById('statsGrid').innerHTML = '<div class="empty-msg">Failed to load: ' + esc(e.message) + '</div>';
  }
}

/* ── Users ── */
var userSearchTimer;
document.getElementById('userSearch').addEventListener('input', function(e) {
  clearTimeout(userSearchTimer);
  userSearchTimer = setTimeout(function(){ loadUsers(e.target.value); }, 300);
});

async function loadUsers(search) {
  try {
    var q = search ? '?search=' + encodeURIComponent(search) + '&limit=50' : '?limit=50';
    var data = await api('GET', '/admin/users' + q);
    var tbody = document.querySelector('#usersTable tbody');
    if (!data.users || !data.users.length) { tbody.innerHTML = '<tr><td colspan="7" class="empty-msg">No users found</td></tr>'; return; }
    tbody.innerHTML = data.users.map(function(u) {
      return '<tr>'
        + '<td style="display:flex;align-items:center;gap:8px">' + av(u.color,u.initials,28) + '<div><div style="font-weight:600">' + esc(u.name||u.handle) + '</div><div style="font-size:11px;color:var(--muted)">@' + esc(u.handle) + '</div></div></td>'
        + '<td style="font-size:12px">' + esc(u.email) + '</td>'
        + '<td>' + roleBadge(u.role) + '</td>'
        + '<td class="status-' + (u.status||'active') + '" style="font-size:12px;font-weight:600">' + esc(u.status||'active') + '</td>'
        + '<td>' + (u.post_count||0) + '</td>'
        + '<td style="font-size:12px;color:var(--muted)">' + ago(u.created_at) + '</td>'
        + '<td><select style="font-size:11px;padding:4px 8px" onchange="changeRole(\'' + u.id + '\',this.value)"><option value="">Change role…</option><option value="member">Member</option><option value="moderator">Moderator</option><option value="admin">Admin</option></select></td>'
        + '</tr>';
    }).join('');
  } catch(e) {
    document.querySelector('#usersTable tbody').innerHTML = '<tr><td colspan="7" class="empty-msg">' + esc(e.message) + '</td></tr>';
  }
}

async function changeRole(userId, role) {
  if (!role) return;
  try {
    await api('POST', '/admin/users/' + userId + '/moderate', { action: 'set_role', new_role: role });
    loadUsers();
  } catch(e) { alert('Failed: ' + e.message); }
}

/* ── Posts ── */
async function loadPosts() {
  try {
    var data = await api('GET', '/admin/posts?limit=50');
    var tbody = document.querySelector('#postsTable tbody');
    if (!data.posts || !data.posts.length) { tbody.innerHTML = '<tr><td colspan="7" class="empty-msg">No posts</td></tr>'; return; }
    tbody.innerHTML = data.posts.map(function(p) {
      return '<tr>'
        + '<td style="max-width:280px"><div style="font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + esc(p.title) + '</div></td>'
        + '<td style="font-size:12px;color:var(--muted)">@' + esc(p.author_handle) + '</td>'
        + '<td style="font-size:11px;text-transform:uppercase;font-weight:600;color:var(--pri)">' + esc(p.type) + '</td>'
        + '<td style="font-size:12px;font-weight:600;color:' + (p.status==='approved'?'var(--suc)':p.status==='pending'?'var(--warn)':'var(--muted)') + '">' + esc(p.status) + '</td>'
        + '<td>' + (p.likes_count||0) + '</td>'
        + '<td style="font-size:12px;color:var(--muted)">' + ago(p.created_at) + '</td>'
        + '<td>'
        + (p.status==='pending' ? '<button class="btn btn-primary" style="font-size:11px;padding:4px 10px" onclick="modPost(\'' + p.id + '\',\'approve\')">Approve</button> ' : '')
        + (p.status!=='ghosted' ? '<button class="btn btn-danger" style="font-size:11px;padding:4px 10px" onclick="modPost(\'' + p.id + '\',\'ghost\')">Ghost</button>' : '')
        + '</td></tr>';
    }).join('');
  } catch(e) {
    document.querySelector('#postsTable tbody').innerHTML = '<tr><td colspan="7" class="empty-msg">' + esc(e.message) + '</td></tr>';
  }
}

async function modPost(postId, action) {
  try {
    await api('POST', '/admin/posts/' + postId + '/moderate', { action: action });
    loadPosts();
  } catch(e) { alert('Failed: ' + e.message); }
}

/* ── Init ── */
checkAuth();
</script>
</body>
</html>
