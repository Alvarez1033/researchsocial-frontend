<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discover — ResearchSocial</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root{--font:'Inter',sans-serif;--font-d:'DM Serif Display',Georgia,serif;--r-sm:.375rem;--r-md:.5rem;--r-lg:.75rem;--r-xl:1rem;--r-full:9999px;--tr:180ms cubic-bezier(.16,1,.3,1);}
:root,[data-theme="light"]{--bg:#f0f2f5;--surface:#fff;--off:#eef0f3;--dyn:#e2e5ea;--div:#dde0e5;--bdr:#cdd1d8;--text:#1a1d23;--muted:#636878;--faint:#a8adb8;--inv:#fff;--pri:#4f46e5;--pri-h:#3730a3;--pri-hl:#e0e7ff;--sh-card:0 2px 8px rgba(0,0,0,.06);}
[data-theme="dark"]{--bg:#0d1117;--surface:#161b22;--off:#21262d;--dyn:#2d333b;--div:#30363d;--bdr:#3d444d;--text:#e6edf3;--muted:#8b949e;--faint:#484f58;--inv:#0d1117;--pri:#818cf8;--pri-h:#a5b4fc;--pri-hl:#1e1b4b;--sh-card:0 2px 8px rgba(0,0,0,.25);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{min-height:100dvh;font-family:var(--font);color:var(--text);background:var(--bg);}
a{color:inherit;text-decoration:none;}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit;}
input{font:inherit;color:inherit;}

/* Navbar */
.nav{display:flex;align-items:center;gap:16px;padding:12px 24px;background:var(--surface);border-bottom:1px solid var(--div);position:sticky;top:0;z-index:100;}
.nav-logo{display:flex;align-items:center;gap:8px;font-family:var(--font-d);font-size:1.25rem;font-weight:700;}
.nav-icon{width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:50%;color:var(--muted);transition:all var(--tr);}
.nav-icon:hover{background:var(--off);color:var(--text);}
.search-wrap{flex:1;max-width:560px;position:relative;}
.search-input{width:100%;padding:10px 16px 10px 42px;background:var(--off);border:1.5px solid transparent;border-radius:var(--r-full);font-size:14px;color:var(--text);transition:all var(--tr);}
.search-input:focus{outline:none;border-color:var(--pri);background:var(--surface);box-shadow:0 0 0 3px var(--pri-hl);}
.search-input::placeholder{color:var(--faint);}
.search-ico{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--faint);pointer-events:none;}

/* Layout */
.wrap{max-width:720px;margin:0 auto;padding:32px 20px 80px;}

/* Tabs */
.tabs{display:flex;gap:4px;background:var(--off);border-radius:var(--r-full);padding:4px;margin-bottom:28px;width:fit-content;}
.tab{padding:6px 18px;border-radius:var(--r-full);font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;transition:all var(--tr);}
.tab.on{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.12);}

/* Section */
.sec-title{font-size:11px;font-weight:700;color:var(--faint);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;}
.sec-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}

/* Topic pills */
.pills{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:32px;}
.pill{padding:6px 14px;border-radius:var(--r-full);font-size:12px;font-weight:600;cursor:pointer;border:1px solid transparent;transition:all var(--tr);}
.pill:hover{opacity:.85;}

/* Post card */
.post{display:block;background:var(--surface);border:1px solid var(--div);border-radius:var(--r-xl);padding:16px 18px;margin-bottom:10px;transition:all var(--tr);}
.post:hover{border-color:var(--bdr);box-shadow:var(--sh-card);transform:translateY(-1px);}
.post-top{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.badge{font-size:9px;font-weight:700;padding:3px 10px;border-radius:var(--r-full);text-transform:uppercase;letter-spacing:.04em;}
.badge-study{background:#14532d;color:#34d399;}
.badge-findings{background:#2e1065;color:#a78bfa;}
.badge-proposal{background:#1e3a5f;color:#60a5fa;}
.badge-review{background:#451a03;color:#fbbf24;}
.badge-discussion{background:#1f2937;color:#9ca3af;}
[data-theme="light"] .badge-study{background:#d1fae5;color:#065f46;}
[data-theme="light"] .badge-findings{background:#ede9fe;color:#5b21b6;}
[data-theme="light"] .badge-proposal{background:#dbeafe;color:#1d4ed8;}
[data-theme="light"] .badge-review{background:#fef3c7;color:#92400e;}
[data-theme="light"] .badge-discussion{background:#f1f5f9;color:#374151;}
.post-author{font-size:12px;color:var(--muted);font-weight:600;}
.post-time{font-size:11px;color:var(--faint);margin-left:auto;}
.post-title{font-family:var(--font-d);font-size:15px;font-weight:700;line-height:1.35;margin-bottom:6px;}
.post-body{font-size:13px;color:var(--muted);line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.post-foot{display:flex;align-items:center;gap:10px;margin-top:10px;}
.post-stat{font-size:11px;color:var(--faint);}
.tag-sm{font-size:10px;font-weight:600;padding:2px 8px;border-radius:var(--r-full);}

/* User card */
.person{display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--div);border-radius:var(--r-xl);padding:14px 16px;margin-bottom:8px;transition:all var(--tr);}
.person:hover{border-color:var(--bdr);box-shadow:var(--sh-card);}
.person-info{flex:1;min-width:0;}
.person-name{font-size:14px;font-weight:700;}
.person-handle{font-size:12px;color:var(--muted);}
.person-bio{font-size:12px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* Topic card */
.topic{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--div);border-radius:var(--r-xl);padding:12px 16px;margin-bottom:8px;cursor:pointer;transition:all var(--tr);}
.topic:hover{border-color:var(--bdr);box-shadow:var(--sh-card);}
.topic-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;}

/* States */
.empty-msg{text-align:center;padding:60px 20px;color:var(--faint);}
.loading{background:var(--dyn);border-radius:var(--r-xl);animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}

.footer{text-align:center;padding:24px;font-size:12px;color:var(--faint);border-top:1px solid var(--div);}
.footer a{color:var(--pri);}
</style>
</head>
<body>

<nav class="nav">
  <a href="/" class="nav-logo">
    <svg width="24" height="24" viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="8" fill="var(--pri)"/><circle cx="11" cy="11" r="4.5" stroke="#fff" stroke-width="2" fill="none"/><circle cx="21" cy="11" r="4.5" stroke="#fff" stroke-width="2" fill="none" opacity=".6"/><circle cx="16" cy="21" r="4.5" stroke="#fff" stroke-width="2" fill="none" opacity=".8"/></svg>
    <span>ResearchSocial</span>
  </a>
  <div class="search-wrap">
    <svg class="search-ico" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input class="search-input" type="text" id="q" placeholder="Search researchers, papers, topics…" autocomplete="off">
  </div>
  <button class="nav-icon" id="themeBtn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
  <a href="/" class="nav-icon" title="Home"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg></a>
</nav>

<div class="wrap">
  <div class="tabs">
    <button class="tab on" data-t="all">All</button>
    <button class="tab" data-t="users">People</button>
    <button class="tab" data-t="posts">Posts</button>
    <button class="tab" data-t="tags">Topics</button>
  </div>
  <div id="browse"></div>
  <div id="out"></div>
</div>

<div class="footer"><a href="https://www.perplexity.ai/computer" target="_blank">Created with Perplexity Computer</a></div>

<script src="/api.js"></script>
<script>
/* ── helpers ── */
function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
function ago(t){if(!t)return '';var ms=Date.now()-new Date(t).getTime(),m=Math.floor(ms/60000);if(m<1)return 'just now';if(m<60)return m+'m ago';var h=Math.floor(m/60);if(h<24)return h+'h ago';return Math.floor(h/24)+'d ago';}
function num(n){return n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e3?(n/1e3).toFixed(1)+'K':String(n||0);}
function avatar(o,sz){var c=o.color||o.author_color||'#818cf8',i=o.initials||o.author_initials||((o.name||o.author_name||'?')[0]).toUpperCase();return '<svg width="'+sz+'" height="'+sz+'" viewBox="0 0 40 40" style="flex-shrink:0"><circle cx="20" cy="20" r="20" fill="'+c+'"/><text x="20" y="21" text-anchor="middle" dominant-baseline="central" fill="#fff" font-size="14" font-weight="600" font-family="Inter,sans-serif">'+i+'</text></svg>';}
function hi(text,q){if(!q||!text)return esc(text||'');var s=esc(text),r=q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');return s.replace(new RegExp('('+r+')','gi'),'<mark style="background:var(--pri-hl);color:var(--pri);border-radius:2px;padding:0 2px">$1</mark>');}

function postHTML(p,q){
  var t=p.type||'discussion';
  var tags=(p.tags||[]).filter(function(x){return x&&x.name;});
  var h='<a href="/post/'+esc(p.id)+'" class="post">';
  h+='<div class="post-top">';
  h+='<span class="badge badge-'+t+'">'+t+'</span>';
  h+=avatar(p,22);
  h+='<span class="post-author">@'+esc(p.author_handle)+'</span>';
  h+='<span class="post-time">'+ago(p.created_at)+'</span>';
  h+='</div>';
  h+='<div class="post-title">'+(q?hi(p.title,q):esc(p.title))+'</div>';
  h+='<div class="post-body">'+(q?hi(p.excerpt||'',q):esc(p.excerpt||''))+'</div>';
  h+='<div class="post-foot">';
  h+='<span class="post-stat">❤️ '+num(p.likes_count)+' · 💬 '+num(p.comments_count)+'</span>';
  for(var i=0;i<Math.min(tags.length,3);i++){
    var tg=tags[i];
    h+='<span class="tag-sm" style="background:'+(tg.color||'#818cf8')+'22;color:'+(tg.color||'#818cf8')+'">#'+esc(tg.name)+'</span>';
  }
  h+='</div></a>';
  return h;
}

/* ── theme ── */
var html=document.documentElement;
var theme=localStorage.getItem('rs_theme')||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');
html.setAttribute('data-theme',theme);
document.getElementById('themeBtn').addEventListener('click',function(){
  theme=theme==='dark'?'light':'dark';
  html.setAttribute('data-theme',theme);
  localStorage.setItem('rs_theme',theme);
});

/* ── state ── */
var curType='all',curQ='',timer=null;

/* ── tabs ── */
document.querySelectorAll('.tab').forEach(function(b){
  b.addEventListener('click',function(){
    document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});
    b.classList.add('on');
    curType=b.dataset.t;
    if(curQ)doSearch(curQ);
  });
});

/* ── search input ── */
document.getElementById('q').addEventListener('input',function(e){
  clearTimeout(timer);
  var v=e.target.value.trim();
  if(!v){showBrowse();return;}
  timer=setTimeout(function(){doSearch(v);},350);
});
document.getElementById('q').addEventListener('keydown',function(e){
  if(e.key==='Enter'){clearTimeout(timer);var v=e.target.value.trim();if(v)doSearch(v);}
});

/* ── browse (default state) ── */
async function loadBrowse(){
  var el=document.getElementById('browse');
  var h='';

  try{
    var tags=await API.getTags();
    if(tags&&tags.length){
      h+='<div class="sec-title">Browse Topics</div><div class="pills">';
      for(var i=0;i<Math.min(tags.length,14);i++){
        var t=tags[i],c=t.color||'#818cf8';
        h+='<button class="pill" style="background:'+c+'18;color:'+c+';border-color:'+c+'33" onclick="document.getElementById(\'q\').value=\''+esc(t.name)+'\';doSearch(\''+esc(t.name)+'\')">#'+esc(t.name)+' <span style="opacity:.5;font-size:10px;margin-left:2px">'+num(t.post_count)+'</span></button>';
      }
      h+='</div>';
    }
  }catch(e){}

  try{
    var data=await API.getFeed({page:1,limit:8,sort:'new'});
    if(data.posts&&data.posts.length){
      h+='<div class="sec-row"><span class="sec-title" style="margin:0">Latest Posts</span><a href="/" style="font-size:12px;color:var(--pri);font-weight:600">Full feed →</a></div>';
      for(var i=0;i<data.posts.length;i++) h+=postHTML(data.posts[i]);
    }
  }catch(e){
    h+='<div class="empty-msg">Could not load posts.</div>';
  }

  el.innerHTML=h;
}

function showBrowse(){
  curQ='';
  document.getElementById('out').innerHTML='';
  document.getElementById('browse').style.display='';
  window.history.replaceState(null,'','/search');
  document.title='Discover — ResearchSocial';
}

/* ── search ── */
async function doSearch(q){
  curQ=q;
  document.getElementById('browse').style.display='none';
  var el=document.getElementById('out');
  el.innerHTML='<div style="display:flex;flex-direction:column;gap:10px">'
    +'<div class="loading" style="height:70px"></div>'
    +'<div class="loading" style="height:70px"></div>'
    +'<div class="loading" style="height:70px"></div></div>';
  window.history.replaceState(null,'','/search?q='+encodeURIComponent(q));
  document.title='"'+q+'" — Search';

  try{
    var data=await API.search(q,curType);
    var h='';
    var hasU=data.users&&data.users.length;
    var hasP=data.posts&&data.posts.length;
    var hasT=data.tags&&data.tags.length;

    if(!hasU&&!hasP&&!hasT){
      el.innerHTML='<div class="empty-msg"><div style="font-size:40px;margin-bottom:10px">🔍</div><div style="font-weight:600;margin-bottom:4px">No results for "'+esc(q)+'"</div><div style="font-size:13px">Try different keywords.</div></div>';
      return;
    }

    if(hasU){
      h+='<div class="sec-title">People</div>';
      for(var i=0;i<data.users.length;i++){
        var u=data.users[i];
        h+='<div class="person">';
        h+='<a href="/profile/'+esc(u.handle)+'">'+avatar(u,44)+'</a>';
        h+='<div class="person-info">';
        h+='<div class="person-name">'+hi(u.name,q)+(u.is_verified?' <span style="color:var(--pri);font-size:12px">✓</span>':'')+'</div>';
        h+='<div class="person-handle">@'+hi(u.handle,q)+(u.affiliation?' · '+esc(u.affiliation):'')+'</div>';
        if(u.bio)h+='<div class="person-bio">'+hi(u.bio.slice(0,90),q)+'</div>';
        h+='</div></div>';
      }
    }

    if(hasP){
      if(hasU)h+='<div style="height:20px"></div>';
      h+='<div class="sec-title">Posts</div>';
      for(var i=0;i<data.posts.length;i++) h+=postHTML(data.posts[i],q);
    }

    if(hasT){
      if(hasU||hasP)h+='<div style="height:20px"></div>';
      h+='<div class="sec-title">Topics</div>';
      for(var i=0;i<data.tags.length;i++){
        var tg=data.tags[i];
        h+='<div class="topic" onclick="document.getElementById(\'q\').value=\''+esc(tg.name)+'\';doSearch(\''+esc(tg.name)+'\')">';
        h+='<div class="topic-dot" style="background:'+(tg.color||'#818cf8')+'"></div>';
        h+='<div><div style="font-size:14px;font-weight:700">#'+hi(tg.name,q)+'</div>';
        if(tg.category)h+='<div style="font-size:12px;color:var(--muted)">'+esc(tg.category)+'</div>';
        h+='</div>';
        h+='<div style="font-size:12px;color:var(--faint);margin-left:auto">'+(tg.post_count||0)+' posts</div>';
        h+='</div>';
      }
    }

    el.innerHTML=h;
  }catch(e){
    el.innerHTML='<div class="empty-msg">⚠️ '+esc(e.message)+'</div>';
  }
}

/* ── init ── */
var initQ=new URLSearchParams(window.location.search).get('q')||'';
if(initQ){document.getElementById('q').value=initQ;doSearch(initQ);}
else{loadBrowse();}
</script>
</body>
</html>
