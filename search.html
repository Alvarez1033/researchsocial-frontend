<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search — ResearchSocial</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root{--text-xs:clamp(.75rem,.7rem+.25vw,.875rem);--text-sm:clamp(.875rem,.8rem+.35vw,1rem);--text-base:clamp(1rem,.95rem+.25vw,1.125rem);--text-lg:clamp(1.125rem,1rem+.75vw,1.5rem);--s1:.25rem;--s2:.5rem;--s3:.75rem;--s4:1rem;--s5:1.25rem;--s6:1.5rem;--s8:2rem;--s16:4rem;--r-sm:.375rem;--r-md:.5rem;--r-lg:.75rem;--r-xl:1rem;--r-full:9999px;--tr:180ms cubic-bezier(.16,1,.3,1);--font:'Inter',sans-serif;--font-d:'DM Serif Display',Georgia,serif;}
:root,[data-theme="light"]{--bg:#f0f2f5;--surface:#fff;--off:#eef0f3;--dyn:#e2e5ea;--div:#dde0e5;--bdr:#cdd1d8;--text:#1a1d23;--muted:#636878;--faint:#a8adb8;--inv:#fff;--pri:#4f46e5;--pri-h:#3730a3;--pri-hl:#e0e7ff;--suc:#16a34a;--err:#dc2626;--warn:#d97706;--sh-sm:0 1px 3px rgba(0,0,0,.08);--sh-md:0 4px 16px rgba(0,0,0,.1);--sh-card:0 2px 8px rgba(0,0,0,.06);}
[data-theme="dark"]{--bg:#0d1117;--surface:#161b22;--off:#21262d;--dyn:#2d333b;--div:#30363d;--bdr:#3d444d;--text:#e6edf3;--muted:#8b949e;--faint:#484f58;--inv:#0d1117;--pri:#818cf8;--pri-h:#a5b4fc;--pri-hl:#1e1b4b;--suc:#4ade80;--err:#f87171;--warn:#fbbf24;--sh-sm:0 1px 3px rgba(0,0,0,.3);--sh-md:0 4px 16px rgba(0,0,0,.4);--sh-card:0 2px 8px rgba(0,0,0,.25);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-font-smoothing:antialiased;}
body{min-height:100dvh;font-family:var(--font);font-size:var(--text-base);color:var(--text);background:var(--bg);transition:background .3s,color .3s;}
img,svg{display:block;max-width:100%;}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit;}
a{color:inherit;text-decoration:none;}
input{font:inherit;color:inherit;}
:focus-visible{outline:2px solid var(--pri);outline-offset:3px;border-radius:var(--r-sm);}

.navbar{display:flex;align-items:center;gap:16px;padding:12px 24px;background:var(--surface);border-bottom:1px solid var(--div);position:sticky;top:0;z-index:100;}
.nav-logo{display:flex;align-items:center;gap:8px;font-family:var(--font-d);font-size:var(--text-lg);font-weight:700;flex-shrink:0;}
.btn-icon{width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:var(--r-full);color:var(--muted);transition:all var(--tr);flex-shrink:0;}
.btn-icon:hover{background:var(--off);color:var(--text);}

/* Big search bar */
.search-bar-wrap{flex:1;max-width:600px;position:relative;}
.search-bar{width:100%;padding:10px 16px 10px 44px;background:var(--off);border:1.5px solid var(--bdr);border-radius:var(--r-full);font-size:15px;color:var(--text);transition:all var(--tr);}
.search-bar:focus{outline:none;border-color:var(--pri);background:var(--surface);box-shadow:0 0 0 3px var(--pri-hl);}
.search-bar::placeholder{color:var(--faint);}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--faint);pointer-events:none;}
.search-clear{position:absolute;right:12px;top:50%;transform:translateY(-50%);width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:var(--dyn);color:var(--muted);font-size:12px;cursor:pointer;display:none;}

.page{max-width:680px;margin:0 auto;padding:28px 24px 80px;}

/* Type tabs */
.type-tabs{display:flex;gap:4px;background:var(--off);border-radius:var(--r-full);padding:4px;margin-bottom:24px;width:fit-content;}
.type-tab{padding:6px 16px;border-radius:var(--r-full);font-size:var(--text-sm);font-weight:500;color:var(--muted);cursor:pointer;transition:all var(--tr);}
.type-tab.active{background:var(--surface);color:var(--text);box-shadow:var(--sh-sm);}

/* Section header */
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;margin-top:24px;}
.section-title{font-size:13px;font-weight:700;color:var(--faint);text-transform:uppercase;letter-spacing:.06em;}
.section-more{font-size:12px;color:var(--pri);font-weight:600;cursor:pointer;transition:opacity var(--tr);}
.section-more:hover{opacity:.7;}

/* User card */
.user-card{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--surface);border:1px solid var(--div);border-radius:var(--r-xl);margin-bottom:8px;transition:all var(--tr);}
.user-card:hover{border-color:var(--bdr);box-shadow:var(--sh-card);transform:translateY(-1px);}
.user-info{flex:1;min-width:0;}
.user-name{font-size:14px;font-weight:700;display:flex;align-items:center;gap:6px;}
.user-handle{font-size:12px;color:var(--muted);}
.user-bio{font-size:12px;color:var(--muted);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.user-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;}
.user-chip{font-size:10px;padding:2px 8px;border-radius:var(--r-full);background:var(--pri-hl);color:var(--pri);font-weight:500;}
.btn-follow-sm{padding:5px 14px;border-radius:var(--r-full);font-size:12px;font-weight:700;border:1.5px solid var(--pri);color:var(--pri);transition:all var(--tr);background:transparent;flex-shrink:0;}
.btn-follow-sm:hover,.btn-follow-sm.following{background:var(--pri);color:var(--inv);}
[data-theme="dark"] .btn-follow-sm.following{color:#0d1117;}

/* Post card */
.post-result{display:flex;flex-direction:column;padding:14px 16px;background:var(--surface);border:1px solid var(--div);border-radius:var(--r-xl);margin-bottom:8px;cursor:pointer;transition:all var(--tr);text-decoration:none;}
#discoverPosts .post-result{overflow:hidden;}
#discoverPosts .post-result>div:first-child:empty,#discoverPosts .post-result>div[style*='height:0'],#discoverPosts a>div:empty:first-child{display:none !important;}
.post-result:hover{border-color:var(--bdr);box-shadow:var(--sh-card);transform:translateY(-1px);}
.post-result-hdr{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.type-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:var(--r-full);letter-spacing:.04em;text-transform:uppercase;}
.b-proposal{background:#dbeafe;color:#1d4ed8;}[data-theme="dark"] .b-proposal{background:#1e3a5f;color:#60a5fa;}
.b-study{background:#d1fae5;color:#065f46;}[data-theme="dark"] .b-study{background:#14532d;color:#34d399;}
.b-review{background:#fef3c7;color:#92400e;}[data-theme="dark"] .b-review{background:#451a03;color:#fbbf24;}
.b-findings{background:#ede9fe;color:#5b21b6;}[data-theme="dark"] .b-findings{background:#2e1065;color:#a78bfa;}
.b-discussion{background:#f1f5f9;color:#374151;}[data-theme="dark"] .b-discussion{background:#1f2937;color:#9ca3af;}
.post-title{font-size:14px;font-weight:700;font-family:var(--font-d);margin-bottom:4px;}
.post-excerpt{font-size:12px;color:var(--muted);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.post-meta-row{display:flex;align-items:center;gap:10px;margin-top:8px;}
.post-tags{display:flex;flex-wrap:wrap;gap:4px;}
.tag{font-size:10px;font-weight:500;padding:2px 8px;border-radius:var(--r-full);}

/* Tag card */
.tag-card{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--surface);border:1px solid var(--div);border-radius:var(--r-xl);margin-bottom:8px;cursor:pointer;transition:all var(--tr);}
.tag-card:hover{border-color:var(--bdr);box-shadow:var(--sh-card);}
.tag-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;}
.tag-name{font-size:14px;font-weight:700;}
.tag-cat{font-size:12px;color:var(--muted);}
.tag-count{font-size:12px;color:var(--faint);margin-left:auto;}

/* Related searches */
.related-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px;}
.related-chip{padding:5px 12px;background:var(--off);border:1px solid var(--bdr);border-radius:var(--r-full);font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;transition:all var(--tr);}
.related-chip:hover{border-color:var(--pri);color:var(--pri);}

/* Empty / loading */
.empty{text-align:center;padding:60px 20px;color:var(--faint);}
.empty-icon{font-size:48px;margin-bottom:12px;}
.skeleton{background:var(--dyn);border-radius:var(--r-md);animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.5;}}

.site-footer{text-align:center;padding:24px;font-size:12px;color:var(--faint);border-top:1px solid var(--div);}
.site-footer a{color:var(--pri);}
@media(max-width:600px){.page{padding:16px 12px 60px;}.navbar{padding:10px 12px;}.nav-logo span{display:none;}}
</style>
</head>
<body>
<nav class="navbar">
  <a href="/" class="nav-logo">
    <svg width="24" height="24" viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="8" fill="var(--pri)"/><circle cx="11" cy="11" r="4.5" stroke="white" stroke-width="2" fill="none"/><circle cx="21" cy="11" r="4.5" stroke="white" stroke-width="2" fill="none" opacity=".6"/><circle cx="16" cy="21" r="4.5" stroke="white" stroke-width="2" fill="none" opacity=".8"/></svg>
    <span>ResearchSocial</span>
  </a>
  <div class="search-bar-wrap">
    <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input class="search-bar" type="text" id="mainSearch" placeholder="Search researchers, papers, topics…" autocomplete="off" autofocus>
    <button class="search-clear" id="clearBtn" onclick="clearSearch()">✕</button>
  </div>
  <button class="btn-icon" data-theme-toggle>
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>
  <a href="/" class="btn-icon" title="Back to feed">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
  </a>
</nav>

<div class="page">
  <!-- Type tabs -->
  <div class="type-tabs" id="typeTabs">
    <button class="type-tab active" onclick="setType('all',this)">All</button>
    <button class="type-tab" onclick="setType('users',this)">People</button>
    <button class="type-tab" onclick="setType('posts',this)">Posts</button>
    <button class="type-tab" onclick="setType('tags',this)">Topics</button>
  </div>

  <!-- Results -->
  <div id="results">
    <div id="emptyState">
      <!-- Topic pills -->
      <div id="trendingSection">
        <div style="font-size:12px;font-weight:700;color:var(--faint);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;">Browse Topics</div>
        <div id="trendingTagsList" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px;"></div>
      </div>
      <!-- Posts shown by default -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
        <div style="font-size:12px;font-weight:700;color:var(--faint);text-transform:uppercase;letter-spacing:.06em;">Latest Posts</div>
        <a href="/" style="font-size:12px;color:var(--pri);font-weight:600;">Full feed →</a>
      </div>
      <div id="discoverPosts"></div>
    </div>
  </div>
</div>

<footer class="site-footer"><a href="https://www.perplexity.ai/computer" target="_blank" rel="noopener noreferrer">Created with Perplexity Computer</a></footer>

<script src="/socket.io/socket.io.js"></script>
<script src="/api.js"></script>
<script>
(function(){const t=document.querySelector('[data-theme-toggle]'),r=document.documentElement;let d=localStorage.getItem('rs_theme')||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');r.setAttribute('data-theme',d);upd(d);t.addEventListener('click',()=>{d=d==='dark'?'light':'dark';r.setAttribute('data-theme',d);localStorage.setItem('rs_theme',d);upd(d);});function upd(v){t.innerHTML=v==='dark'?`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>`:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;}})();

const me = Auth.getUser();
let currentType = 'all';
let searchTimer = null;
let currentQ = '';

// Load trending tags and featured researchers for the empty state
async function loadTrending() {
  // Load topic pills
  try {
    const tags = await API.getTags();
    const tagEl = document.getElementById('trendingTagsList');
    if (tagEl) {
      tagEl.innerHTML = tags.slice(0, 12).map(t => `
        <button onclick="document.getElementById('mainSearch').value='${esc(t.name)}';document.getElementById('clearBtn').style.display='flex';doSearch('${esc(t.name)}')"
          style="padding:5px 12px;background:${t.color||'#818cf8'}22;color:${t.color||'#818cf8'};border:1px solid ${t.color||'#818cf8'}44;border-radius:9999px;font-size:12px;font-weight:600;cursor:pointer;transition:all var(--tr);"
          onmouseover="this.style.opacity='.8'" onmouseout="this.style.opacity='1'">
          #${esc(t.name)} <span style="opacity:.5;font-size:10px;">${t.post_count||0}</span>
        </button>`).join('');
    }
  } catch(_) {}

  // Load recent posts by default
  try {
    const postsEl = document.getElementById('discoverPosts');
    if (!postsEl) return;
    postsEl.innerHTML = [1,2,3].map(()=>`<div class="skeleton" style="height:140px;border-radius:12px;margin-bottom:10px;"></div>`).join('');
    const data = await API.getFeed({ page: 1, limit: 8, sort: 'new' });
    if (!data.posts.length) { postsEl.innerHTML = '<div style="text-align:center;padding:40px;color:var(--faint)">No posts yet.</div>'; return; }
    postsEl.innerHTML = data.posts.map(p => `
      <a href="/post/${p.id}" class="post-result" style="display:flex;flex-direction:column;padding:14px 16px;background:var(--surface);border:1px solid var(--div);border-radius:var(--r-xl);margin-bottom:8px;cursor:pointer;transition:all var(--tr);text-decoration:none;"
         onmouseover="this.style.borderColor='var(--bdr)';this.style.transform='translateY(-1px)';this.style.boxShadow='var(--sh-card)'"
         onmouseout="this.style.borderColor='var(--div)';this.style.transform='';this.style.boxShadow=''">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
          <span class="type-badge b-${p.type}">${p.type}</span>
          <div style="display:flex;align-items:center;gap:6px;">${avatarSVG({color:p.author_color,initials:p.author_initials,avatar_url:p.author_avatar},18)}<a href="/profile/${esc(p.author_handle)}" style="font-size:12px;color:var(--muted);font-weight:600;" onclick="event.stopPropagation()">@${esc(p.author_handle)}</a></div>
          <span style="font-size:11px;color:var(--faint);margin-left:auto;">${fmtTime(p.created_at)}</span>
        </div>
        <div style="font-size:14px;font-weight:700;font-family:'DM Serif Display',Georgia,serif;margin-bottom:4px;color:var(--text);">${esc(p.title)}</div>
        <div style="font-size:12px;color:var(--muted);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${esc(p.excerpt)}</div>
        <div style="display:flex;align-items:center;gap:12px;margin-top:8px;">
          <span style="font-size:11px;color:var(--faint);">❤️ ${fmtNum(p.likes_count)} · 💬 ${fmtNum(p.comments_count)}</span>
          ${(p.tags||[]).filter(t=>t&&t.name).slice(0,3).map(t=>`<span style="font-size:10px;font-weight:500;padding:2px 8px;border-radius:9999px;background:${t.color||'#818cf8'}22;color:${t.color||'#818cf8'}">#${esc(t.name)}</span>`).join('')}
        </div>
      </a>`).join('');
  } catch(e) {
    const el = document.getElementById('discoverPosts');
    if (el) el.innerHTML = '<div style="color:var(--muted);font-size:13px;text-align:center;padding:20px;">Failed to load posts.</div>';
  }
}

// Init from URL param
const params = new URLSearchParams(window.location.search);
const initQ = params.get('q') || '';
if (initQ) {
  document.getElementById('mainSearch').value = initQ;
  document.getElementById('clearBtn').style.display = 'flex';
  document.getElementById('emptyState').style.display = 'none';
  doSearch(initQ);
} else {
  loadTrending();
}

document.getElementById('mainSearch').addEventListener('input', e => {
  const val = e.target.value;
  document.getElementById('clearBtn').style.display = val ? 'flex' : 'none';
  clearTimeout(searchTimer);
  if (!val.trim()) { showEmpty(); return; }
  searchTimer = setTimeout(() => doSearch(val.trim()), 300);
});

document.getElementById('mainSearch').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    clearTimeout(searchTimer);
    const val = e.target.value.trim();
    if (val) doSearch(val);
  }
});

function clearSearch() {
  document.getElementById('mainSearch').value = '';
  document.getElementById('clearBtn').style.display = 'none';
  showEmpty();
  document.getElementById('mainSearch').focus();
}

function setType(type, btn) {
  currentType = type;
  document.querySelectorAll('.type-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  if (currentQ) doSearch(currentQ);
}

function showEmpty() {
  currentQ = '';
  window.history.replaceState(null, '', '/search');
  document.title = 'Search — ResearchSocial';
  document.getElementById('results').innerHTML = '';
  document.getElementById('emptyState').style.display = '';
}

async function doSearch(q) {
  currentQ = q;
  window.history.replaceState(null, '', '/search?q=' + encodeURIComponent(q));
  document.title = `"${q}" — Search ResearchSocial`;

  // Hide empty state, show results
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('results').style.display = '';

  // Show skeleton
  document.getElementById('results').innerHTML = `
    <div style="display:flex;flex-direction:column;gap:8px;">
      ${[1,2,3,4,5].map(()=>`<div style="height:72px;border-radius:var(--r-xl);" class="skeleton"></div>`).join('')}
    </div>`;

  try {
    const data = await API.search(q, currentType);
    renderResults(data, q);
  } catch(e) {
    document.getElementById('results').innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><div>${esc(e.message)}</div></div>`;
  }
}

function renderResults(data, q) {
  const el = document.getElementById('results');
  let html = '';

  // Related searches
  if (data.related?.length) {
    html += `<div style="margin-bottom:16px;">
      <div style="font-size:12px;font-weight:700;color:var(--faint);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;">Related searches</div>
      <div class="related-wrap">
        ${data.related.map(r => `<button class="related-chip" onclick="relatedSearch('${esc(r.suggestion)}')">${r.type==='user'?'👤':'🏷️'} ${esc(r.suggestion)}</button>`).join('')}
      </div>
    </div>`;
  }

  const hasUsers = data.users?.length;
  const hasPosts = data.posts?.length;
  const hasTags = data.tags?.length;

  if (!hasUsers && !hasPosts && !hasTags) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><div style="font-weight:600;margin-bottom:6px;">No results for "${esc(q)}"</div><div style="font-size:13px;">Try different keywords or browse by topic.</div></div>`;
    return;
  }

  // People
  if (hasUsers) {
    html += `<div class="section-hdr"><span class="section-title">People</span>${currentType==='all'&&data.users.length===5?`<span class="section-more" onclick="setTypeEl('users')">See all people →</span>`:''}
    </div>`;
    html += data.users.map(u => renderUserCard(u)).join('');
  }

  // Posts
  if (hasPosts) {
    html += `<div class="section-hdr" style="margin-top:${hasUsers?'24px':'0'}"><span class="section-title">Posts</span>${currentType==='all'&&data.posts.length===5?`<span class="section-more" onclick="setTypeEl('posts')">See all posts →</span>`:''}
    </div>`;
    html += data.posts.map(p => renderPostResult(p, q)).join('');
  }

  // Tags
  if (hasTags) {
    html += `<div class="section-hdr" style="margin-top:${hasUsers||hasPosts?'24px':'0'}"><span class="section-title">Topics</span>${currentType==='all'&&data.tags.length===5?`<span class="section-more" onclick="setTypeEl('tags')">See all topics →</span>`:''}
    </div>`;
    html += data.tags.map(t => renderTagCard(t)).join('');
  }

  el.innerHTML = html;
}

function highlight(text, q) {
  if (!q || !text) return esc(text||'');
  const safe = esc(text);
  const safeQ = q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return safe.replace(new RegExp(`(${safeQ})`, 'gi'), '<mark style="background:var(--pri-hl);color:var(--pri);border-radius:2px;padding:0 1px;">$1</mark>');
}

function renderUserCard(u) {
  return `
  <div class="user-card">
    <a href="/profile/${esc(u.handle)}">${avatarSVG(u, 48)}</a>
    <div class="user-info">
      <div class="user-name">
        <a href="/profile/${esc(u.handle)}" style="transition:color var(--tr);" onmouseover="this.style.color='var(--pri)'" onmouseout="this.style.color=''">${highlight(u.name, currentQ)}</a>
        ${u.is_verified ? '<span style="color:var(--pri);font-size:12px" title="Verified">✓</span>' : ''}
        ${u.open_to_collab ? '<span style="font-size:10px;background:#d1fae5;color:#065f46;padding:1px 6px;border-radius:9999px;font-weight:600;" title="Open to collaborate">🤝 Open</span>' : ''}
      </div>
      <div class="user-handle">@${highlight(u.handle, currentQ)} ${u.affiliation?`· <span style="color:var(--pri)">${esc(u.affiliation)}</span>`:''}
      </div>
      ${u.bio ? `<div class="user-bio">${highlight(u.bio.slice(0,80), currentQ)}</div>` : ''}
      ${u.interests?.length ? `<div class="user-tags">${u.interests.slice(0,3).map(i=>`<span class="user-chip">${esc(i)}</span>`).join('')}</div>` : ''}
    </div>
    <div style="display:flex;flex-direction:column;gap:6px;align-items:center;">
      <button class="btn-follow-sm" onclick="handleFollow('${esc(u.handle)}',this)">Follow</button>
      <div style="font-size:11px;color:var(--faint);">${fmtNum(u.followers_count)} followers</div>
    </div>
  </div>`;
}

function renderPostResult(p, q) {
  const tags = Array.isArray(p.tags) ? p.tags.filter(t=>t&&t.name) : [];
  return `
  <a href="/" class="post-result">
    <div class="post-result-hdr">
      <span class="type-badge b-${p.type}">${p.type}</span>
      <div style="display:flex;align-items:center;gap:6px;">${avatarSVG({color:p.author_color,initials:p.author_initials,avatar_url:p.author_avatar},18)}<span style="font-size:12px;color:var(--muted);">@${esc(p.author_handle)}</span></div>
      <span style="font-size:11px;color:var(--faint);margin-left:auto;">${fmtTime(p.created_at)}</span>
    </div>
    <div class="post-title">${highlight(p.title, q)}</div>
    <div class="post-excerpt">${highlight(p.excerpt, q)}</div>
    ${tags.length ? `<div class="post-tags" style="margin-top:8px;">${tags.map(t=>`<span class="tag" style="background:${t.color||'#818cf8'}22;color:${t.color||'#818cf8'}">#${esc(t.name)}</span>`).join('')}</div>` : ''}
    <div class="post-meta-row">
      <span style="font-size:11px;color:var(--faint);">❤️ ${fmtNum(p.likes_count)} · 💬 ${fmtNum(p.comments_count)}</span>
    </div>
  </a>`;
}

function renderTagCard(t) {
  return `
  <div class="tag-card" onclick="window.location.href='/?tag=${esc(t.slug)}'">
    <div class="tag-dot" style="background:${t.color||'#818cf8'};"></div>
    <div>
      <div class="tag-name">#${highlight(t.name, currentQ)}</div>
      ${t.category ? `<div class="tag-cat">${esc(t.category)}</div>` : ''}
    </div>
    <div class="tag-count">${t.post_count||0} posts</div>
  </div>`;
}

async function handleFollow(handle, btn) {
  if (!me) { window.location.href = '/'; return; }
  try {
    const res = await API.followUser(handle);
    btn.classList.toggle('following', res.following);
    btn.textContent = res.following ? '✓ Following' : 'Follow';
    showToast(res.following ? `✅ Following @${handle}` : `Unfollowed @${handle}`);
  } catch(e) { showToast('⚠️ ' + e.message); }
}

function relatedSearch(q) {
  document.getElementById('mainSearch').value = q;
  document.getElementById('clearBtn').style.display = 'flex';
  doSearch(q);
}

function setTypeEl(type) {
  const btn = document.querySelector(`.type-tab:nth-child(${type==='users'?2:type==='posts'?3:4})`);
  if (btn) { setType(type, btn); }
}
</script>
</body>
</html>
